defaults:
- default

max_epochs: 60
batch_size: 32
num_workers: 8
learning_rate: 1e-3
loss_function: "bce"
use_class_weights: true
val_split: 0.25
seed: 42
checkpoint_metric: "val_f1"
checkpoint_mode: "max"
early_stopping_patience: 15
freeze_backbone: true

augmentation:
  horizontal_flip: true
  gamma_contrast: true
  scale: [ 0.90, 1.10 ]
  translate_px: [ -15, 15 ]
  rotate: [ -15, 15 ]
